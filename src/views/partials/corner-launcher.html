<!-- Bottom-right quick-tools launcher: a single "⋯" FAB that expands into a
     collapsible stack of tools — Dice, Notes (quick journal), and Skills.
     The Dice/Notes buttons keep their historical ids (diceFab / journalFab):
     modules/dice.js and modules/journal.js bind to those ids to toggle their
     popups. The Skills item + popup are wired by bindCornerLauncher() in app.js.
     Choosing any tool collapses the stack so its popup isn't covered. -->
<div class="fab-stack" id="fabStack">
  <button id="skillsFab" class="corner-fab fab-item" title="Skills quick reference" aria-label="Open skills quick reference">
    <span class="fab-label">Skills</span>
    <span class="corner-fab-glyph">✦</span>
  </button>
  <button id="journalFab" class="corner-fab fab-item" title="Quick journal note" aria-label="Open quick journal">
    <span class="fab-label">Notes</span>
    <span class="corner-fab-glyph">✎</span>
    <span class="corner-fab-badge" id="journalPopCount"></span>
  </button>
  <button id="diceFab" class="corner-fab fab-item" title="Dice roller" aria-label="Open dice roller">
    <span class="fab-label">Dice</span>
    <span class="corner-fab-glyph">🎲</span>
  </button>
  <button id="fabLauncher" class="corner-fab fab-launcher" title="Quick tools" aria-label="Open quick tools menu" aria-expanded="false">
    <span class="corner-fab-glyph">⋯</span>
  </button>
</div>

<!-- Skills quick reference popup (same corner-popup pattern as dice/journal). -->
<div id="skillsPopup" class="corner-popup" role="dialog" aria-label="Skills quick reference">
  <div class="corner-popup-head">
    <div>
      <div class="corner-popup-title"><span>Skills</span><span class="rune">◈</span></div>
      <div class="corner-popup-sub">Click a skill for its description &amp; bonus breakdown.</div>
    </div>
    <button id="skillsPopClose" class="corner-popup-close" aria-label="Close">✕</button>
  </div>
  <div class="corner-popup-list" id="skillsPopList"></div>
</div>

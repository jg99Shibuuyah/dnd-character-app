<!-- Add/Edit popup for the Inventory tab. One modal serves both flavors:
     Equipment (full effects form working on a draft, committed on Save) and
     plain Inventory items (name + quantity). The backdrop's mode-equip /
     mode-item class picks which fields show. Shares the modal chrome with the
     Journal/Choice popups. Wired in app.js: bindItemModal(), opened by
     openEquipModal() / openItemModal(). -->
<div class="app-modal-backdrop item-modal-backdrop" id="itemModalBackdrop" aria-hidden="true">
  <div class="app-modal panel" role="dialog" aria-modal="true" aria-labelledby="itemModalHeading">
    <div class="app-modal-head">
      <span class="app-modal-heading" id="itemModalHeading">Add Equipment</span>
      <span class="app-modal-date" id="itemModalHint"></span>
      <button class="app-modal-close" id="itemModalClose" type="button" aria-label="Close">✕</button>
    </div>
    <div class="app-modal-body">
      <label class="app-field">
        <span class="app-field-label">Name</span>
        <input id="itemModalName" type="text" placeholder="e.g. Longsword +1">
      </label>

      <!-- Plain inventory item: just a quantity -->
      <label class="app-field item-modal-item-only">
        <span class="app-field-label">Quantity</span>
        <input id="itemModalQty" type="number" value="1" min="0">
      </label>

      <!-- Equipment: description + effects (classes shared with the old inline cards) -->
      <div class="item-modal-equip-only">
        <label class="equip-toggle"><input type="checkbox" id="itemModalEquipped" checked><span>Equipped</span></label>
        <label class="app-field">
          <span class="app-field-label">Description</span>
          <textarea id="itemModalDesc" placeholder="What is it? What does it do?"></textarea>
        </label>
        <div class="eq-effects">
          <div class="eq-field-group">
            <span class="eq-lbl">Attack</span>
            <input class="eq-atk-bonus" id="itemModalAtkBonus" placeholder="+6 hit">
            <input class="eq-atk-dmg" id="itemModalAtkDmg" placeholder="1d8+4 slashing">
          </div>
          <div class="eq-field-group">
            <span class="eq-lbl">Armor</span>
            <input id="itemModalAC" placeholder="+2 (shield) or =16 (heavy armor)" style="width:220px;">
          </div>
          <div class="eq-field-group" id="itemModalAbilities">
            <span class="eq-lbl">Ability</span>
            <!-- .eq-ab inputs rebuilt by openEquipModal() so they always match the draft -->
          </div>
          <div class="eq-field-group">
            <span class="eq-lbl">Skills</span>
            <div class="eq-skill-list" id="itemModalSkillList"></div>
            <select id="itemModalSkillPick"><option value="">skill…</option></select>
            <input id="itemModalSkillBonus" type="number" placeholder="±" style="width:56px;">
            <button class="add-btn" id="itemModalSkillAdd" type="button">Add</button>
          </div>
          <div class="eq-field-group">
            <span class="eq-lbl">Spells</span>
            <div class="eq-spell-list" id="itemModalSpellList"></div>
            <input id="itemModalSpellName" placeholder="Granted spell">
            <select id="itemModalSpellLvl" style="width:110px;"></select>
            <button class="add-btn" id="itemModalSpellAdd" type="button">Add</button>
          </div>
        </div>
      </div>
    </div>
    <div class="app-modal-foot">
      <span class="app-modal-status" id="itemModalStatus"></span>
      <button class="add-btn" id="itemModalSave" type="button">Save</button>
    </div>
  </div>
</div>

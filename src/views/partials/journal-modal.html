<!-- Journal entry detail popup: editable Title + Entry sections, with Save and
     Delete. Opened from the Journal tab's cards. Wired in modules/journal.js. -->
<div class="app-modal-backdrop" id="jrnlModalBackdrop" aria-hidden="true">
  <div class="app-modal panel" role="dialog" aria-modal="true" aria-labelledby="jrnlModalHeading">
    <div class="app-modal-head">
      <span class="app-modal-heading" id="jrnlModalHeading">Journal Entry</span>
      <span class="app-modal-date" id="jrnlModalDate"></span>
      <button class="app-modal-close" id="jrnlModalClose" type="button" aria-label="Close">✕</button>
    </div>
    <div class="app-modal-body">
      <label class="app-field">
        <span class="app-field-label">Title</span>
        <input id="jrnlModalTitle" type="text" placeholder="Entry title (optional)">
      </label>
      <label class="app-field">
        <span class="app-field-label">Entry</span>
        <textarea id="jrnlModalText" placeholder="Write your note…"></textarea>
      </label>
    </div>
    <div class="app-modal-foot">
      <button class="pbtn danger" id="jrnlModalDelete" type="button">Delete</button>
      <span class="app-modal-status" id="jrnlModalStatus"></span>
      <button class="add-btn" id="jrnlModalSave" type="button">Save</button>
    </div>
  </div>
</div>

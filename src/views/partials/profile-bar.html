<!-- Profile switcher + Options menu (theme picker). Wired in app.js:
     bindProfileBar() and bindOptionsMenu(). -->
<div class="profile-bar">
  <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-expanded="false" aria-controls="sidebar" title="Menu">☰</button>
  <label>Profile</label>
  <select id="profileSelect"></select>
  <button class="pbtn" id="newCharBtn">+ New</button>
  <button class="pbtn" id="dupCharBtn">Duplicate</button>
  <button class="pbtn" id="importCharBtn" title="Import a character from a JSON file">Import</button>
  <input type="file" id="importCharFile" accept=".json,application/json" hidden>
  <button class="pbtn danger" id="delCharBtn">Delete</button>
  <%- include('options-menu.html') %>
  <span class="save-status" id="saveStatus">Saved</span>
</div>

<!-- Shared reference detail popups. Modeless, draggable, edge-snappable floating
     windows spawned by openNotesModal() in app.js. Used by the Notes search AND
     the sheet's Spells/Actions tabs. Include once per page that opens details.
     Windows are cloned from the <template> into #nrWindowLayer; #nrSnapZone is
     the snap-preview highlight shown while dragging near an edge. -->
<div class="nr-window-layer" id="nrWindowLayer"></div>
<div class="nr-snap-zone" id="nrSnapZone" hidden></div>
<template id="nrWindowTpl">
  <section class="nr-window panel" role="dialog" aria-label="Reference detail">
    <header class="nr-window-head" data-role="head">
      <button class="nr-modal-back" data-role="back" type="button" aria-label="Back to previous" hidden>‹ Back</button>
      <span class="f-name" data-role="title"></span>
      <span class="nr-modal-badges" data-role="badges"></span>
      <button class="nr-modal-close" data-role="close" type="button" aria-label="Close">✕</button>
    </header>
    <div class="nr-window-body" data-role="body"></div>
    <div class="nr-modal-foot" data-role="foot"></div>
  </section>
</template>

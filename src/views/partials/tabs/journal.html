<!-- TAB: Journal (character-specific notes). Cards live in state.journal; clicking
     one opens the editable detail modal (partials/journal-modal.html). The composer
     adds new notes. Wired in modules/journal.js. -->
<div class="tab-pane" id="tab-journal">
  <div class="panel">
    <h2><span>Journal</span><span class="rune">◈</span></h2>
    <div class="picker-hint"><span id="journalCount">No notes yet</span> for <span class="hl" id="journalCharName">this character</span>. Click a note to open it, edit its sections, or delete it.</div>

    <div class="journal-compose">
      <input id="journalNewTitle" type="text" placeholder="Entry title (optional)">
      <textarea id="journalNewText" rows="3" placeholder="Jot down what happened…"></textarea>
      <button id="journalAddBtn" class="add-btn">+ Add entry</button>
    </div>

    <div class="journal-grid" id="journalEntries"></div>
  </div>

  <div class="panel">
    <h2><span>Roll Log</span><button class="pbtn rolllog-clear" id="rollLogClear" type="button">Clear</button></h2>
    <div class="picker-hint"><span id="rollLogCount">No rolls yet</span> — automatically recorded from the dice roller (🎲, bottom-right).</div>
    <div class="rolllog-list" id="rollLogList"></div>
  </div>
</div>

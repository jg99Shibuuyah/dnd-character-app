<!-- TAB: Inventory & Equipment -->
<div class="tab-pane" id="tab-inventory">
  <div class="grid grid-two">
    <div class="panel">
      <h2><span>Equipment</span><span class="rune">⚙</span></h2>
      <div class="picker-hint">Gear you're wearing or wielding. <span class="hl">Equipped</span> items feed your attacks, spellcasting, ability scores, and skill bonuses on the other tabs. Ability fields accept <span class="hl">+2</span> (bonus) or <span class="hl">=19</span> (set score).</div>
      <div id="equipmentList"></div>
      <button class="add-btn" id="addEquip">+ Add Equipment</button>
    </div>

    <div class="panel">
      <h2><span>Currency</span><span class="rune">◆</span></h2>
      <div class="currency">
        <div class="c"><label>CP</label><input id="cCP" type="number" value="0"></div>
        <div class="c"><label>SP</label><input id="cSP" type="number" value="0"></div>
        <div class="c"><label>EP</label><input id="cEP" type="number" value="0"></div>
        <div class="c"><label>GP</label><input id="cGP" type="number" value="0"></div>
        <div class="c"><label>PP</label><input id="cPP" type="number" value="0"></div>
      </div>
    </div>
  </div>

    <div class="panel">
      <h2><span>Inventory</span><span class="rune">◆</span></h2>
      <div id="inventoryList"></div>
      <button class="add-btn" id="addItem">+ Add Item</button>
    </div>
</div>

<!-- TAB: Skills — the full skill list (moved off the Character tab), with
     proficient rows highlighted. Rows are built by buildSkills() in app.js;
     clicking one opens a floating description popup (openSkillDetail). -->
<div class="tab-pane" id="tab-skills">
<div class="grid grid-two">

  <div>
    <div class="panel">
      <h2><span>Skills <button class="legend-btn skill-legend-btn" type="button" title="Click any skill for a quick description. Highlighted rows are proficiencies — toggle them on the Character Settings tab. Tagged rows are granted by your species or background.">?</button></span><span class="rune">✦</span></h2>
      <div id="skillsPanel"></div>
      <div class="mini-row" style="margin-top:8px; border-top:1px solid var(--parchment-line); padding-top:8px;">
        <label>Proficiency Bonus</label>
        <span class="val" id="profBonusSkills">+2</span>
      </div>
      <div class="mini-row">
        <label>Proficient Skills</label>
        <span class="val" id="skillProfCount">0</span>
      </div>
    </div>
  </div>

  <div>
    <div class="panel">
      <h2><span>Passive Senses</span><span class="rune">✦</span></h2>
      <div class="mini-row passive-row" data-passive="Perception" title="Click for a quick description"><label>Passive Perception</label><span class="val" id="passivePerception">10</span></div>
      <div class="mini-row passive-row" data-passive="Investigation" title="Click for a quick description"><label>Passive Investigation</label><span class="val" id="passiveInvestigation">10</span></div>
      <div class="mini-row passive-row" data-passive="Insight" title="Click for a quick description"><label>Passive Insight</label><span class="val" id="passiveInsight">10</span></div>
      <div class="picker-hint" style="margin-top:8px;">Click a sense for details. Passive scores are <span class="hl">10 + skill bonus</span> — what you notice without actively looking.</div>
    </div>
  </div>

</div>
</div>

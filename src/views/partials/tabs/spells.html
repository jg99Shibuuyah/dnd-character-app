<!-- TAB: Spells -->
<div class="tab-pane" id="tab-spells">
  <div class="grid grid-spells">
    <div class="panel">
      <h2><span>Spell Slots</span><span class="rune">✶</span></h2>
      <div id="spellSlots"></div>
    </div>

    <div class="panel spell-list">
      <h2><span>Spell Library</span><span class="rune">✶</span></h2>
      <div class="spell-lib-controls">
        <select id="spellClassSelect"></select>
        <input id="spellSearch" type="text" placeholder="Search spells...">
      </div>
      <div id="spellLibraryList" class="spell-lib-list"></div>
      <div class="custom-spell-row">
        <input id="customSpellName" placeholder="Custom / homebrew spell name">
        <select id="customSpellLevel" class="lv-select"></select>
        <div class="tag-picker inline" id="customSpellTagPicker"></div>
        <button class="add-btn" id="addCustomSpell">+ Add</button>
      </div>
    </div>

    <div class="panel">
      <h2><span>Known Spells</span><span class="rune">✶</span></h2>
      <div id="knownSpellsList"></div>
    </div>
  </div>
</div>

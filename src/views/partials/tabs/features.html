<!-- TAB: Features & Traits -->
<div class="tab-pane" id="tab-features">
  <div class="grid grid-half">
    <div>
      <div class="panel">
        <h2><span>Class Features</span><span class="rune">✦</span></h2>
        <div id="classFeaturesList"></div>
      </div>
      <div class="panel">
        <h2><span>Species Traits</span><span class="rune">✦</span></h2>
        <div id="speciesTraitsList"></div>
      </div>
      <div class="panel">
        <h2><span>Background</span><span class="rune">✦</span></h2>
        <div id="backgroundFeatureList"></div>
      </div>
      <div class="panel">
        <h2><span>Other Features &amp; Traits</span><span class="rune">✦</span></h2>
        <div id="otherFeaturesList"></div>
      </div>
      <div class="panel">
        <h2><span>Add Feature</span><span class="rune">✦</span></h2>
        <div class="picker-hint">Add a feat, boon, or custom trait. <span class="hl">Goes in</span> picks which list above it joins — your entries sit at the bottom of that list and can be edited or removed at any time.</div>
        <div class="import-grid">
          <div class="set-field full"><label>Goes In</label>
            <select id="cfCat">
              <option value="class">Class Features</option>
              <option value="species">Species Traits</option>
              <option value="other" selected>Other Features &amp; Traits</option>
            </select>
          </div>
          <div class="set-field full"><label>Name</label><input id="cfName" placeholder="e.g. Lucky"></div>
          <div class="set-field full"><label>Description</label>
            <textarea id="cfDesc" class="import-ta" style="min-height:60px;" placeholder="What does it do?"></textarea>
          </div>
          <div class="full">
            <button class="add-btn" id="cfSubmit">+ Add Feature</button>
            <button class="pbtn" id="cfCancel" style="margin-left:8px;display:none;">Cancel</button>
          </div>
        </div>
        <div class="import-msg" id="cfMsg"></div>
      </div>
    </div>

    <div class="panel">
      <h2><span>Personality</span><span class="rune">✦</span></h2>
      <label style="font-family:'Orbitron', sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);">Traits</label>
      <textarea class="trait" id="persTraits" style="min-height:36px;"></textarea>
      <label style="font-family:'Orbitron', sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);">Ideals</label>
      <textarea class="trait" id="persIdeals" style="min-height:36px;"></textarea>
      <label style="font-family:'Orbitron', sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);">Bonds</label>
      <textarea class="trait" id="persBonds" style="min-height:36px;"></textarea>
      <label style="font-family:'Orbitron', sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);">Flaws</label>
      <textarea class="trait" id="persFlaws" style="min-height:36px;"></textarea>
    </div>
  </div>
</div>

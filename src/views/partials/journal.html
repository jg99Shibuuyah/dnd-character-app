<!-- Floating character journal: a quick-notes popup reachable from any tab.
     Entries live in state.journal, so each character keeps their own log.
     Wired in modules/journal.js. -->
<button id="journalFab" class="journal-fab" title="Character journal" aria-label="Open character journal">
  <span class="journal-fab-glyph">✎</span>
  <span class="journal-count" id="journalCount"></span>
</button>

<div id="journalPopup" class="journal-popup" role="dialog" aria-label="Character journal">
  <div class="journal-head">
    <div>
      <div class="journal-title"><span>Journal</span><span class="rune">◈</span></div>
      <div class="journal-char" id="journalCharName"></div>
    </div>
    <button id="journalCloseBtn" class="journal-close" aria-label="Close journal">✕</button>
  </div>

  <div class="journal-compose">
    <input id="journalNewTitle" type="text" placeholder="Entry title (optional)">
    <textarea id="journalNewText" rows="3" placeholder="Jot down what happened…"></textarea>
    <button id="journalAddBtn" class="add-btn">+ Add entry</button>
  </div>

  <div class="journal-entries" id="journalEntries"></div>
</div>

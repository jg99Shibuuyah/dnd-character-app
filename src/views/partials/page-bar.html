<!-- Header bar for standalone pages (Library, Notes): sidebar toggle, page title,
     and the shared Options/theme menu. Pass { title } from the view. -->
<div class="profile-bar page-bar">
  <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-expanded="false" aria-controls="sidebar" title="Menu">☰</button>
  <span class="page-title"><%= title %></span>
  <%- include('options-menu.html') %>
</div>

<!-- Custom feature-choice popup: opened when "Other…" is picked on a feature that
     offers choices (Features or Settings tab). Captures a name + description for
     a homebrew option. Shares the modal chrome with the Journal popup.
     Wired in app.js: bindChoiceModal() / openChoiceModal(). -->
<div class="app-modal-backdrop choice-modal-backdrop" id="choiceModalBackdrop" aria-hidden="true">
  <div class="app-modal panel" role="dialog" aria-modal="true" aria-labelledby="choiceModalHeading">
    <div class="app-modal-head">
      <span class="app-modal-heading" id="choiceModalHeading">Custom Choice</span>
      <span class="app-modal-date" id="choiceModalFeature"></span>
      <button class="app-modal-close" id="choiceModalClose" type="button" aria-label="Close">✕</button>
    </div>
    <div class="app-modal-body">
      <label class="app-field">
        <span class="app-field-label">Name</span>
        <input id="choiceModalName" type="text" placeholder="e.g. Whirlwind Stance">
      </label>
      <label class="app-field">
        <span class="app-field-label">Description</span>
        <textarea id="choiceModalDesc" placeholder="What does it do?"></textarea>
      </label>
    </div>
    <div class="app-modal-foot">
      <button class="pbtn danger" id="choiceModalClear" type="button">Clear Choice</button>
      <span class="app-modal-status" id="choiceModalStatus"></span>
      <button class="add-btn" id="choiceModalSave" type="button">Save</button>
    </div>
  </div>
</div>

<!-- Level seal, character name, and XP readout. Updated by renderCharacter()/recalc() in app.js. -->
<div class="hero">
  <div class="seal">
    <div class="lvl-num" id="sealLevel">1</div>
    <div class="lvl-label">Level</div>
  </div>
  <div>
    <div class="hero-name" id="heroName">Unnamed Adventurer</div>
    <div class="hero-summary" id="heroSummary"></div>
    <div class="hero-hint">// edit identity &amp; class in <span class="cmd">[ Settings ]</span></div>
  </div>
  <div class="xp-block">
    <label>Experience</label>
    <div class="xp-val" id="heroXP">0</div>
  </div>
</div>

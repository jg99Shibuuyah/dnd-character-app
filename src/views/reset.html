<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character Ledger — Reset password</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body data-page="reset">
<div class="auth-wrap">
  <div class="panel auth-panel">
    <h2><span>Reset password</span></h2>

    <form id="resetForm" class="auth-form">
      <label>New password <span class="auth-hint">(8+ characters)</span>
        <input id="resetPassword" type="password" autocomplete="new-password" required minlength="8">
      </label>
      <label>Repeat new password
        <input id="resetPassword2" type="password" autocomplete="new-password" required minlength="8">
      </label>
      <button class="pbtn auth-submit" type="submit">Set new password</button>
    </form>

    <div class="auth-error" id="authError" hidden></div>
    <div class="auth-ok" id="authOk" hidden></div>
  </div>
</div>
<script>
(function(){
  const form = document.getElementById('resetForm');
  const err = document.getElementById('authError');
  const ok = document.getElementById('authOk');
  const token = new URLSearchParams(location.search).get('token');
  form.addEventListener('submit', async e => {
    e.preventDefault();
    err.hidden = true; ok.hidden = true;
    const p1 = document.getElementById('resetPassword').value;
    const p2 = document.getElementById('resetPassword2').value;
    if(p1 !== p2){ err.textContent = 'Passwords do not match'; err.hidden = false; return; }
    const r = await fetch('/api/auth/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: p1 })
    });
    const body = await r.json().catch(() => ({}));
    if(!r.ok){ err.textContent = body.error || 'Reset failed'; err.hidden = false; return; }
    ok.textContent = 'Password updated — redirecting to sign in…';
    ok.hidden = false;
    setTimeout(() => { location.href = '/login'; }, 1200);
  });
})();
</script>
</body>
</html>

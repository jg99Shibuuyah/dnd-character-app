<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character Ledger — Sign in</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body data-page="login">
<div class="auth-wrap">
  <div class="panel auth-panel">
    <h2><span>Character Ledger</span></h2>

    <div class="auth-tabs">
      <button class="auth-tab on" data-mode="login" type="button">Sign in</button>
      <button class="auth-tab" data-mode="register" type="button">Create account</button>
    </div>

    <form id="loginForm" class="auth-form" data-mode="login">
      <label>Username or email
        <input id="loginUsername" autocomplete="username" required>
      </label>
      <label>Password
        <input id="loginPassword" type="password" autocomplete="current-password" required>
      </label>
      <button class="pbtn auth-submit" type="submit">Sign in</button>
      <button class="auth-link" id="forgotLink" type="button">Forgot password?</button>
    </form>

    <form id="registerForm" class="auth-form" data-mode="register" hidden>
      <label>Username
        <input id="regUsername" autocomplete="username" required minlength="3" maxlength="32">
      </label>
      <label>Email <span class="auth-hint">(for password recovery)</span>
        <input id="regEmail" type="email" autocomplete="email" required>
      </label>
      <label>Password <span class="auth-hint">(8+ characters)</span>
        <input id="regPassword" type="password" autocomplete="new-password" required minlength="8">
      </label>
      <button class="pbtn auth-submit" type="submit">Create account</button>
    </form>

    <form id="forgotForm" class="auth-form" data-mode="forgot" hidden>
      <p class="auth-note">Enter your username or email. A reset link will be generated
        on the server (check the server console/logs).</p>
      <label>Username or email
        <input id="forgotIdentifier" required>
      </label>
      <button class="pbtn auth-submit" type="submit">Generate reset link</button>
      <button class="auth-link" id="backToLogin" type="button">Back to sign in</button>
    </form>

    <div class="auth-error" id="authError" hidden></div>
    <div class="auth-ok" id="authOk" hidden></div>
  </div>
</div>
<script src="/login.js"></script>
</body>
</html>

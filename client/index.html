<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&D Character Sheet</title>
  <link rel="stylesheet" href="/styles.css" />
  <!--
    Builtin game data ships as classic scripts whose top-level consts are
    shared globals (same files, same order as the legacy EJS views — see
    public/resources/builtin/README.md). They load before the module graph;
    src/rules/builtin-data.js re-exports the globals for ESM consumers.
  -->
  <script src="/resources/builtin/spells.js"></script>
  <script src="/resources/builtin/actions.js"></script>
  <script src="/resources/builtin/alignments.js"></script>
  <script src="/resources/builtin/weapon-mastery.js"></script>
  <script src="/resources/builtin/abilities-skills.js"></script>
  <script src="/resources/builtin/classes.js"></script>
  <script src="/resources/builtin/species.js"></script>
  <script src="/resources/builtin/backgrounds.js"></script>
  <script src="/resources/builtin/subclasses.js"></script>
  <script src="/resources/builtin/subspecies.js"></script>
  <script src="/resources/builtin/spell-slots.js"></script>
  <script src="/resources/builtin/fighting-styles.js"></script>
  <script src="/resources/builtin/snapshots.js"></script>
  <script src="/resources/companions.js"></script>
  <script src="/resources/monsters.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    /* Stamp the saved-or-default theme + line-overlay toggles onto <body>
       before React mounts, so the first paint matches the user's choice
       (default: rain) with no flash of the terminal/dark palette.
       Defensive: never throws. */
    (function () {
      try {
        var t = localStorage.getItem('characterSheetTheme') || 'rain';
        if (t && t !== 'dark') document.body.dataset.theme = t;
        if (localStorage.getItem('characterSheetCyberGrid') === 'false') document.body.classList.add('no-cyber-grid');
        if (localStorage.getItem('characterSheetCyberScanlines') === 'false') document.body.classList.add('no-cyber-scanlines');
      } catch (e) {}
    })();
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
